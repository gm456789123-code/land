services:

  wordpress:
    build: .
    ports:
      - "80:80"
    environment:
      WORDPRESS_DB_HOST:      land_mysql:3306
      WORDPRESS_DB_NAME:      land
      WORDPRESS_DB_USER:      root
      WORDPRESS_DB_PASSWORD:  ""
      WORDPRESS_TABLE_PREFIX: wp_
      WORDPRESS_SITE_URL:     http://localhost
      WP_DEBUG:               "false"
    depends_on:
      land_mysql:
        condition: service_healthy
    volumes:
      - uploads:/var/www/html/wp-content/uploads
    restart: unless-stopped

  land_mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE:             land
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8080:80"
    environment:
      PMA_HOST: land_mysql
      PMA_PORT: 3306
    depends_on:
      - land_mysql
    restart: unless-stopped

volumes:
  db_data:
  uploads:
